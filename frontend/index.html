<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon Admin - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <i class="fa-solid fa-scissors"></i>
                    <span>Salon Admin</span>
                </div>
            </div>

            <div id="auth-main-section" class="auth-section active">
                <h2 id="auth-title">Welcome</h2>
                <p id="auth-subtitle" class="subtitle">Enter your registered mobile number to login</p>

                <form id="otp-form">
                    <div class="form-group" id="phone-group">
                        <label for="auth-phone">Phone Number</label>
                        <div class="input-with-icon">
                            <i class="fa-solid fa-phone"></i>
                            <input type="tel" id="auth-phone" placeholder="10-digit mobile number" maxlength="10" required>
                        </div>
                        <button type="button" id="send-otp-btn" class="btn btn-secondary btn-block" style="margin-top: 15px;">Send OTP</button>
                    </div>
                    
                    <div class="form-group" id="otp-group" style="display: none;">
                        <label for="auth-otp">One-Time Password</label>
                        <div class="input-with-icon">
                            <i class="fa-solid fa-lock"></i>
                            <input type="text" id="auth-otp" placeholder="6-digit OTP" maxlength="6">
                        </div>
                        <button type="submit" id="verify-otp-btn" class="btn btn-primary btn-block" style="margin-top: 15px;">Verify & Login</button>
                        <p class="resend-text">Didn't receive? <a href="#" id="resend-otp">Resend</a></p>
                    </div>

                    <!-- Access Denied message (hidden by default) -->
                    <div id="access-denied" style="display: none; text-align: center; padding: 20px 0;">
                        <i class="fa-solid fa-shield-halved" style="font-size: 40px; color: #FF5B5B; margin-bottom: 15px;"></i>
                        <h3 style="color: #FF5B5B; margin-bottom: 8px;">Access Denied</h3>
                        <p style="color: var(--text-muted); font-size: 14px;">This phone number is not registered.<br>Please contact your administrator.</p>
                        <button type="button" id="try-again-btn" class="btn btn-secondary btn-block" style="margin-top: 20px;">Try Another Number</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="js/api.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
